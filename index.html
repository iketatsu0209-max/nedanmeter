<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>せどり価格チェッカー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1c1c26;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #ff6b35;
      --yahoo: #ff0033;
      --mercari: #ff4458;
      --text: #e8e8f0;
      --muted: #7070a0;
      --success: #00ff88;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 16px 20px 12px;
      background: linear-gradient(180deg, #0d0d18 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #0070ff);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .app-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), #7eb8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-left: auto;
    }

    /* Main */
    main {
      flex: 1;
      padding: 16px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Camera Section */
    .camera-zone {
      background: var(--card);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
      cursor: pointer;
    }

    .camera-zone.has-image {
      border-style: solid;
      border-color: var(--accent);
    }

    .camera-zone.has-image .placeholder {
      display: none;
    }

    #preview-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      position: absolute;
      top: 0; left: 0;
      border-radius: calc(var(--radius) - 2px);
    }

    .camera-zone.has-image #preview-img {
      display: block;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 40px 20px;
    }

    .camera-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1e2a3a, #2a3a4a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .placeholder p {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .placeholder strong {
      display: block;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 4px;
    }

    /* Image overlay info */
    .image-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      padding: 20px 16px 12px;
      display: none;
    }

    .camera-zone.has-image .image-overlay {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .change-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    /* Input hidden */
    #file-input { display: none; }

    /* Search Button */
    .search-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, #0070ff 100%);
      color: #000;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .search-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .search-btn:not(:disabled):active {
      transform: scale(0.97);
    }

    /* Loading */
    .loading-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      display: none;
    }

    .loading-card.visible { display: flex; flex-direction: column; align-items: center; gap: 16px; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .loading-step.active { color: var(--accent); }
    .loading-step.done { color: var(--success); }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .loading-step.active .step-dot { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
    .loading-step.done .step-dot { background: var(--success); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Results */
    .results {
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .results.visible { display: flex; }

    /* Product Name Card */
    .product-card {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid #2a3a5e;
      border-radius: var(--radius);
      padding: 16px;
    }

    .product-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .product-name-display {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
    }

    /* Summary Card */
    .summary-card {
      background: linear-gradient(135deg, #1a2a1a, #1a301a);
      border: 1px solid #2a4a2a;
      border-radius: var(--radius);
      padding: 16px;
      white-space: pre-line;
      font-size: 14px;
      line-height: 1.8;
    }

    /* Source Section */
    .source-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .source-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .source-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .badge-yahoo { background: #ff003322; color: #ff6677; border: 1px solid #ff003344; }
    .badge-mercari { background: #ff445822; color: #ff8899; border: 1px solid #ff445844; }

    .price-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .price-item-name {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .price-item-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      color: var(--success);
    }

    .price-item-label {
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
    }

    .price-item a {
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      width: fit-content;
      margin-top: 2px;
    }

    .no-data {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px;
      background: var(--card);
      border-radius: var(--radius);
    }

    /* Error */
    .error-card {
      background: #2a1a1a;
      border: 1px solid #4a2a2a;
      border-radius: var(--radius);
      padding: 16px;
      color: #ff8899;
      font-size: 14px;
      display: none;
    }

    .error-card.visible { display: block; }

    /* Bottom CTA */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: linear-gradient(0deg, var(--bg) 60%, transparent);
      pointer-events: none;
    }

    .bottom-bar > * { pointer-events: all; }

    /* Transitions */
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">📦</div>
  <span class="app-title">SEDORI PRICE</span>
  <span class="app-subtitle">価格チェッカー</span>
</header>

<main>
  <!-- Camera / Image Zone -->
  <div class="camera-zone" id="camera-zone" onclick="document.getElementById('file-input').click()">
    <img id="preview-img" alt="商品プレビュー" />
    <div class="placeholder">
      <div class="camera-icon">📷</div>
      <div>
        <strong>商品を撮影 / 選択</strong>
        <p>タップしてカメラまたは<br>ギャラリーから選択</p>
      </div>
    </div>
    <div class="image-overlay">
      <span style="color:#fff; font-size:13px;">✅ 画像を選択済み</span>
      <button class="change-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">変更</button>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" capture="environment" />

  <!-- Loading -->
  <div class="loading-card" id="loading-card">
    <div class="spinner"></div>
    <div style="font-size:15px; font-weight:700;">価格を調査中...</div>
    <div class="loading-steps">
      <div class="loading-step" id="step-1"><div class="step-dot"></div> 🔍 商品をAIが識別中</div>
      <div class="loading-step" id="step-2"><div class="step-dot"></div> 🛒 Yahoo!ショッピング検索中</div>
      <div class="loading-step" id="step-3"><div class="step-dot"></div> 📦 メルカリ相場を確認中</div>
      <div class="loading-step" id="step-4"><div class="step-dot"></div> 📊 相場を集計中</div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-card" id="error-card"></div>

  <!-- Results -->
  <div class="results" id="results">

    <!-- Product Name -->
    <div class="product-card fade-in">
      <div class="product-label">🔎 認識した商品</div>
      <div class="product-name-display" id="result-product-name">—</div>
    </div>

    <!-- Summary -->
    <div class="summary-card fade-in" id="result-summary"></div>

    <!-- Mercari Prices -->
    <div class="source-section fade-in">
      <div class="source-header">
        <span class="source-badge badge-mercari">MERCARI</span>
        売り切れ相場
      </div>
      <div id="mercari-prices"></div>
    </div>

    <!-- Yahoo Prices -->
    <div class="source-section fade-in">
      <div class="source-header">
        <span class="source-badge badge-yahoo">YAHOO</span>
        ショッピング
      </div>
      <div id="yahoo-prices"></div>
    </div>

  </div>
</main>

<!-- Bottom CTA -->
<div class="bottom-bar">
  <button class="search-btn" id="search-btn" disabled onclick="checkPrice()">
    <span>📊</span> 価格をチェック
  </button>
</div>

<script>
  const API_BASE = window.location.origin;
  let selectedFile = null;

  const fileInput = document.getElementById('file-input');
  const cameraZone = document.getElementById('camera-zone');
  const previewImg = document.getElementById('preview-img');
  const searchBtn = document.getElementById('search-btn');
  const loadingCard = document.getElementById('loading-card');
  const results = document.getElementById('results');
  const errorCard = document.getElementById('error-card');

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;

    const reader = new FileReader();
    reader.onload = (ev) => {
      previewImg.src = ev.target.result;
      cameraZone.classList.add('has-image');
    };
    reader.readAsDataURL(file);

    searchBtn.disabled = false;
    results.classList.remove('visible');
    errorCard.classList.remove('visible');
  });

  function setStep(stepNum) {
    const steps = ['step-1','step-2','step-3','step-4'];
    steps.forEach((id, i) => {
      const el = document.getElementById(id);
      el.className = 'loading-step';
      if (i + 1 < stepNum) el.classList.add('done');
      else if (i + 1 === stepNum) el.classList.add('active');
    });
  }

  async function checkPrice() {
    if (!selectedFile) return;

    // Show loading
    loadingCard.classList.add('visible');
    results.classList.remove('visible');
    errorCard.classList.remove('visible');
    searchBtn.disabled = true;

    setStep(1);
    await delay(800);
    setStep(2);

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      // Simulate step transitions
      const stepTimer = setTimeout(() => setStep(3), 1500);
      const stepTimer2 = setTimeout(() => setStep(4), 3000);

      const resp = await fetch(`${API_BASE}/api/check-price`, {
        method: 'POST',
        body: formData,
      });

      clearTimeout(stepTimer);
      clearTimeout(stepTimer2);
      setStep(4);
      await delay(300);

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.detail || 'エラーが発生しました');
      }

      const data = await resp.json();
      displayResults(data);

    } catch (err) {
      showError(err.message);
    } finally {
      loadingCard.classList.remove('visible');
      searchBtn.disabled = false;
    }
  }

  function displayResults(data) {
    document.getElementById('result-product-name').textContent = data.product_name;
    document.getElementById('result-summary').textContent = data.summary;

    // Mercari prices
    const mercariEl = document.getElementById('mercari-prices');
    if (data.mercari_prices && data.mercari_prices.length > 0) {
      mercariEl.innerHTML = data.mercari_prices.map(p => `
        <div class="price-item">
          <div class="price-item-label">${p.label}</div>
          <div class="price-item-price">${p.price}</div>
        </div>
      `).join('');
    } else {
      mercariEl.innerHTML = '<div class="no-data">メルカリの価格情報が見つかりませんでした</div>';
    }

    // Yahoo prices
    const yahooEl = document.getElementById('yahoo-prices');
    if (data.yahoo_prices && data.yahoo_prices.length > 0) {
      yahooEl.innerHTML = data.yahoo_prices.map(p => `
        <div class="price-item">
          <div class="price-item-name">${p.name}</div>
          <div class="price-item-price">${p.price}</div>
          ${p.url ? `<a href="${p.url}" target="_blank">商品ページを見る →</a>` : ''}
        </div>
      `).join('');
    } else {
      yahooEl.innerHTML = '<div class="no-data">Yahoo!ショッピングの価格情報が見つかりませんでした</div>';
    }

    results.classList.add('visible');
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(message) {
    errorCard.textContent = `⚠️ ${message}`;
    errorCard.classList.add('visible');
  }

  function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }
</script>

</body>
</html>
